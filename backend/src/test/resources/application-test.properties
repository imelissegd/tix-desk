# ============================================================
# Server (not actually used during tests, but harmless)
# ============================================================
server.port=0

# ============================================================
# DataSource - H2 In-Memory (instead of MySQL)
# ============================================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ============================================================
# Mail - Dummy values (no real SMTP calls)
# ============================================================
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ============================================================
# JWT - Dummy secret (test-only)
# ============================================================
app.jwt.secret=test-jwt-secret-very-long-and-random-for-tests-only-123456789
app.jwt.expiration-ms=60000
app.jwt.refresh-expiration-ms=120000

# ============================================================
# Logging (quiet tests)
# ============================================================
logging.level.com.ticketing=INFO
logging.level.org.springframework.security=INFO
spring.datasource.url=jdbc:mysql://localhost:3306/ticketing_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=ticketing_user
spring.datasource.password=ticketing_pass

# Use 'update' locally so Hibernate creates tables automatically for now
# Will switch to Liquibase migrations in a later phase
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
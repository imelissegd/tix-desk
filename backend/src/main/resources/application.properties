# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# DataSource
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ticketing_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:ticketing_user}
spring.datasource.password=${DB_PASSWORD:ticketing_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 6 (Spring Boot 3) — do NOT set dialect manually, auto-detected
spring.jpa.open-in-view=false

# ============================================================
# Spring Mail
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@ticketing.com}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# JWT
# ============================================================
app.jwt.secret=${JWT_SECRET:change-this-to-a-very-long-random-secret-at-least-256-bits}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ============================================================
# Logging
# ============================================================
logging.level.com.ticketing=DEBUG
logging.level.org.springframework.security=INFO

# ============================================================
# OpenAPI / Swagger
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method